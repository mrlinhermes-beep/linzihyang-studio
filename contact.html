{% extends "home.html" %}

{% block content %}
<!-- Contact Section -->
<section class="contact-section" id="contact">
    <div class="section-header">
        <span class="section-label">Contact</span>
        <h2 class="section-title magnetic">聯繫我</h2>
    </div>
    
    <div class="contact-content">
        <p class="contact-philosophy magnetic">{{ config.philosophy }}</p>
        
        <div class="contact-links">
            <a href="mailto:{{ config.email }}" class="contact-link magnetic">
                <div class="icon">✉</div>
                <span>Email</span>
            </a>
            <a href="tel:{{ config.phone.replace(' ', '') }}" class="contact-link magnetic">
                <div class="icon">📞</div>
                <span>Phone</span>
            </a>
            <a href="{{ config.social.facebook }}" target="_blank" class="contact-link magnetic">
                <div class="icon">f</div>
                <span>Facebook</span>
            </a>
            <a href="{{ config.social.instagram }}" target="_blank" class="contact-link magnetic">
                <div class="icon">📷</div>
                <span>Instagram</span>
            </a>
            <a href="{{ config.social.youtube }}" target="_blank" class="contact-link magnetic">
                <div class="icon">▶</div>
                <span>YouTube</span>
            </a>
            <a href="{{ config.social.line }}" target="_blank" class="contact-link magnetic">
                <div class="icon">💬</div>
                <span>LINE</span>
            </a>
        </div>
        
        <div class="contact-form reveal">
            <form onsubmit="event.preventDefault(); alert('感謝您的訊息！我會盡快回覆您。');">
                <div class="form-group">
                    <label>姓名 Name</label>
                    <input type="text" placeholder="您的姓名" required>
                    <div class="focus-line"></div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="your@email.com" required>
                    <div class="focus-line"></div>
                </div>
                <div class="form-group">
                    <label>訊息 Message</label>
                    <textarea placeholder="請描述您的需求..." rows="4" required></textarea>
                    <div class="focus-line"></div>
                </div>
                <button type="submit" class="btn btn-primary magnetic" style="width:100%; margin-top:1rem;">發送訊息</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
