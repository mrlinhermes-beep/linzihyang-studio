<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯繫我 - linzihyang studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #e1a64c;
            --secondary: #ad803b;
            --dark: #00170b;
            --cream: #eee4db;
            --white: #ffffff;
        }
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--dark);
            color: var(--white);
            overflow-x: hidden;
        }
        
        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,23,11,0.95), transparent);
            transition: all 0.4s ease;
        }
        
        .nav.scrolled {
            background: rgba(0,23,11,0.98);
            backdrop-filter: blur(20px);
            padding: 1rem 4rem;
            border-bottom: 1px solid rgba(225,166,76,0.1);
        }
        
        .nav-logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: 0.1em;
        }
        
        .nav-menu {
            display: flex;
            gap: 3rem;
            list-style: none;
        }
        
        .nav-menu a {
            color: var(--cream);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            position: relative;
            padding: 0.5rem 0;
            transition: color 0.3s ease;
        }
        
        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }
        
        .nav-menu a:hover {
            color: var(--primary);
        }
        
        .nav-menu a:hover::after {
            width: 100%;
        }
        
        .nav-menu a.active {
            color: var(--primary);
        }
        
        .nav-menu a.active::after {
            width: 100%;
        }
        
        /* Page Header */
        .page-header {
            padding: 10rem 4rem 4rem;
            text-align: center;
            background: linear-gradient(135deg, var(--dark) 0%, #002a15 100%);
            position: relative;
            overflow: hidden;
        }
        
        .page-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(225,166,76,0.1) 0%, transparent 70%);
        }
        
        .page-title {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 1rem;
            position: relative;
        }
        
        .page-subtitle {
            font-size: 1.5rem;
            color: var(--cream);
            opacity: 0.9;
            position: relative;
        }
        
        /* Contact Content */
        .contact-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 4rem;
        }
        
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
        }
        
        .contact-info h2 {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 2rem;
        }
        
        .contact-details {
            margin-bottom: 3rem;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem 0;
            border-bottom: 1px solid rgba(225,166,76,0.1);
        }
        
        .contact-icon {
            width: 50px;
            height: 50px;
            background: rgba(225,166,76,0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary);
        }
        
        .contact-text h4 {
            font-size: 1.1rem;
            color: var(--cream);
            margin-bottom: 0.3rem;
        }
        
        .contact-text a,
        .contact-text p {
            color: var(--primary);
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s ease;
        }
        
        .contact-text a:hover {
            color: var(--white);
        }
        
        .social-links {
            display: flex;
            gap: 1rem;
        }
        
        .social-link {
            width: 50px;
            height: 50px;
            background: rgba(225,166,76,0.1);
            border: 1px solid rgba(225,166,76,0.3);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            text-decoration: none;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }
        
        .social-link:hover {
            background: var(--primary);
            color: var(--dark);
            transform: translateY(-5px);
        }
        
        .contact-form {
            background: rgba(225,166,76,0.05);
            border: 1px solid rgba(225,166,76,0.2);
            border-radius: 20px;
            padding: 3rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--cream);
            font-size: 0.95rem;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(225,166,76,0.3);
            border-radius: 10px;
            color: var(--white);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(225,166,76,0.1);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        /* Footer */
        .footer {
            padding: 3rem 4rem;
            text-align: center;
            background: rgba(0,23,11,0.5);
            border-top: 1px solid rgba(225,166,76,0.1);
        }
        
        .footer-logo {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        
        .footer-text {
            color: var(--cream);
            opacity: 0.7;
            margin-bottom: 2rem;
        }
        
        .copyright {
            color: var(--cream);
            opacity: 0.5;
            font-size: 0.9rem;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .nav {
                padding: 1rem 2rem;
            }
            
            .nav-menu {
                display: none;
            }
            
            .page-header {
                padding: 8rem 2rem 3rem;
            }
            
            .contact-content {
                padding: 2rem;
            }
            
            .contact-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav" id="navbar">
        <a href="index.html" class="nav-logo">LINZIYANG STUDIO</a>
        <ul class="nav-menu">
            <li><a href="index.html">首頁</a></li>
            <li><a href="about.html">關於我</a></li>
            <li><a href="portfolio.html">作品集</a></li>
            <li><a href="courses.html">課程</a></li>
            <li><a href="contact.html" class="active">聯繫</a></li>
        </ul>
    </nav>
    
    <!-- Page Header -->
    <header class="page-header">
        <h1 class="page-title">聯繫我</h1>
        <p class="page-subtitle">期待與您合作</p>
    </header>
    
    <!-- Contact Content -->
    <section class="contact-content">
        <div class="contact-grid">
            <div class="contact-info">
                <h2>聯絡資訊</h2>
                <div class="contact-details">
                    <div class="contact-item">
                        <div class="contact-icon">📧</div>
                        <div class="contact-text">
                            <h4>Email</h4>
                            <a href="mailto:zerokevinlin@gmail.com">zerokevinlin@gmail.com</a>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon">📱</div>
                        <div class="contact-text">
                            <h4>LINE</h4>
                            <a href="https://lin.ee/NCmDKig" target="_blank">@linzihyang</a>
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon">🌐</div>
                        <div class="contact-text">
                            <h4>Website</h4>
                            <a href="https://linzihyang.my.canva.site/home" target="_blank">linzihyang.my.canva.site</a>
                        </div>
                    </div>
                </div>
                <h3 style="color: var(--cream); margin-bottom: 1rem;">Follow Me</h3>
                <div class="social-links">
                    <a href="https://www.facebook.com/linzihyangstudio" class="social-link" target="_blank">f</a>
                    <a href="https://www.instagram.com/lin_zihyang/" class="social-link" target="_blank">📷</a>
                    <a href="https://www.youtube.com/@Mr-Lin-studio" class="social-link" target="_blank">▶</a>
                    <a href="https://lin.ee/NCmDKig" class="social-link" target="_blank">💬</a>
                </div>
            </div>
            <div class="contact-form">
                <h3 style="color: var(--primary); margin-bottom: 2rem; font-size: 1.8rem;">發送訊息</h3>
                <form>
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" placeholder="您的姓名">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label>主題</label>
                        <input type="text" placeholder="訊息主題">
                    </div>
                    <div class="form-group">
                        <label>內容</label>
                        <textarea placeholder="請輸入您的訊息..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">發送訊息</button>
                </form>
            </div>
        </div>
    </section>
    
    <!-- Footer -->
    <footer class="footer">
        <div class="footer-logo">LINZIYANG STUDIO</div>
        <p class="footer-text">影像與行銷策略的專家</p>
        <p class="copyright">&copy; 2026 linzihyang studio. All rights reserved.</p>
    </footer>
    
    <script>
        // Navbar Scroll Effect
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 100) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
