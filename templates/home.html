<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.title }} - 影像與行銷策略專家</title>
    <meta name="description" content="{{ config.tagline }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/interactive.css">
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-logo">{{ config.title }}</div>
            <div class="loading-bar">
                <div class="loading-progress" id="loadingProgress"></div>
            </div>
            <div class="loading-status" id="loadingStatus">初始化 AI Agent...</div>
        </div>
    </div>

    <!-- Navigation -->
    <nav id="navbar">
        <a href="/" class="nav-logo magnetic">{{ config.title }}</a>
        <ul class="nav-links">
            <li><a href="/" class="magnetic" data-section="home">首頁</a></li>
            <li><a href="/about" class="magnetic" data-section="about">關於我</a></li>
            <li><a href="/portfolio" class="magnetic" data-section="portfolio">作品集</a></li>
            <li><a href="/courses" class="magnetic" data-section="courses">課程</a></li>
            <li><a href="/contact" class="magnetic" data-section="contact">聯繫</a></li>
        </ul>
        <div class="hamburger magnetic" id="hamburger" onclick="toggleMobileMenu()">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <button class="close-menu magnetic" onclick="toggleMobileMenu()">✕</button>
        <a href="/" onclick="toggleMobileMenu()">首頁</a>
        <a href="/about" onclick="toggleMobileMenu()">關於我</a>
        <a href="/portfolio" onclick="toggleMobileMenu()">作品集</a>
        <a href="/courses" onclick="toggleMobileMenu()">課程</a>
        <a href="/contact" onclick="toggleMobileMenu()">聯繫</a>
    </div>

    <!-- Hero Section with Three.js Canvas -->
    <section class="hero" id="hero">
        <canvas id="threeCanvas"></canvas>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-badge magnetic">管理雜誌・百大講師</div>
            <h1 class="hero-title magnetic" id="heroTitle">{{ config.title }}</h1>
            <p class="hero-quote magnetic" id="typingText"></p>
            <p class="hero-desc magnetic">{{ config.subtitle }}</p>
            <div class="hero-cta">
                <a href="/portfolio" class="btn btn-primary magnetic">查看作品</a>
                <a href="/contact" class="btn btn-outline magnetic">聯繫我</a>
            </div>
        </div>
        <div class="scroll-indicator">
            <div class="scroll-mouse"></div>
            <span>向下滾動</span>
        </div>
    </section>

    <!-- Main Content -->
    <main id="mainContent">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        <p>© {{ config.author }} — {{ config.tagline }}</p>
    </footer>

    <script src="/static/js/interactive.js"></script>
    <script>
        // Initialize site with config
        window.SITE_CONFIG = {{ config | tojson }};
    </script>
</body>
</html>
